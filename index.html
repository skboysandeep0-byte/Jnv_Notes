<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Basic Web App</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
      background-color: #f0f0f0;
    }
    h1 {
      color: #333;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background-color: #0070f3;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background-color: #005bb5;
    }
    #counter {
      font-size: 24px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>🚀 My First Web App</h1>
  <p>Click the button to increase counter</p>

  <button onclick="increase()">Click Me</button>

  <div id="counter">0</div>

  <script>
    let count = 0;

    function increase() {
      count++;
      document.getElementById("counter").innerText = count;
    }
  </script>

</body>
</html>
